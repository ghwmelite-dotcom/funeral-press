<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative cross in background -->
  <g opacity="0.15" transform="translate(820, 120)">
    <rect x="85" y="0" width="50" height="280" rx="6" fill="#C9A84C"/>
    <rect x="20" y="70" width="180" height="50" rx="6" fill="#C9A84C"/>
  </g>

  <!-- Left side content -->
  <!-- Logo text: FuneralPress -->
  <text x="80" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#C9A84C" letter-spacing="2">
    FuneralPress
  </text>

  <!-- Decorative line under logo -->
  <rect x="80" y="270" width="120" height="3" rx="1.5" fill="#C9A84C" opacity="0.6"/>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#ffffff" opacity="0.9">
    Design Beautiful Memorial Brochures
  </text>

  <!-- Right side: brochure shape outlines -->
  <g transform="translate(850, 300)">
    <!-- Back brochure -->
    <rect x="20" y="20" width="160" height="220" rx="4" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.2" transform="rotate(-5, 100, 130)"/>
    <!-- Front brochure -->
    <rect x="0" y="0" width="160" height="220" rx="4" fill="none" stroke="#C9A84C" stroke-width="2" opacity="0.35"/>
    <!-- Lines inside front brochure suggesting content -->
    <rect x="20" y="30" width="80" height="4" rx="2" fill="#C9A84C" opacity="0.2"/>
    <rect x="20" y="50" width="120" height="3" rx="1.5" fill="#C9A84C" opacity="0.12"/>
    <rect x="20" y="65" width="110" height="3" rx="1.5" fill="#C9A84C" opacity="0.12"/>
    <rect x="20" y="80" width="100" height="3" rx="1.5" fill="#C9A84C" opacity="0.12"/>
    <!-- Image placeholder in brochure -->
    <rect x="20" y="110" width="120" height="70" rx="3" fill="#C9A84C" opacity="0.08" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.15"/>
  </g>

  <!-- Bottom: website URL -->
  <text x="600" y="580" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#C9A84C" opacity="0.5" text-anchor="middle" letter-spacing="3">
    funeralpress.org
  </text>

  <!-- Thin top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#C9A84C" opacity="0.4"/>
</svg>