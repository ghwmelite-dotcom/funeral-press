<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuneralPress — Outro Cover (Royal Blue & Silver)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #C0C0C0;
    --accent-light: #D4D4D8;
    --accent-dark: #9CA3AF;
    --black: #0A1628;
    --black-deep: #060F1E;
    --cream: #F8FAFC;
    --navy: #0F1F3A;
    --navy-deep: #0A1628;
  }

  body {
    background: var(--black-deep);
    color: var(--cream);
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  /* === GRAIN === */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px;
  }

  /* === BACKGROUND === */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(192,192,192,0.03) 0%, transparent 60%),
      radial-gradient(ellipse 35% 40% at 75% 70%, rgba(15,31,58,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 35% 40% at 25% 30%, rgba(15,31,58,0.2) 0%, transparent 55%),
      radial-gradient(ellipse 40% 35% at 50% 50%, rgba(59,130,246,0.03) 0%, transparent 55%),
      linear-gradient(180deg, #060F1E 0%, #0A1628 50%, #0F1F3A 100%);
  }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 65% 60% at 50% 50%, transparent 45%, rgba(6,15,30,0.7) 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* === FRAMES === */
  .frame-outer {
    position: absolute;
    inset: 28px;
    border: 1px solid rgba(192,192,192,0.15);
    animation: fade-in 2s ease 0.3s both;
  }
  .frame-inner {
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(192,192,192,0.08);
    animation: fade-in 2s ease 0.6s both;
  }

  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* === CORNER ORNAMENTS === */
  .corner {
    position: absolute;
    width: 80px;
    height: 80px;
    opacity: 0;
    animation: corner-appear 1.5s ease-out both;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 40px; left: 40px; animation-delay: 0.8s; }
  .corner-tr { top: 40px; right: 40px; transform: scaleX(-1); animation-delay: 1s; }
  .corner-bl { bottom: 40px; left: 40px; transform: scaleY(-1); animation-delay: 1.2s; }
  .corner-br { bottom: 40px; right: 40px; transform: scale(-1); animation-delay: 1.4s; }

  @keyframes corner-appear {
    from { opacity: 0; } to { opacity: 0.45; }
  }

  /* === PARTICLES === */
  .particles { position: absolute; inset: 0; overflow: hidden; }
  .particle {
    position: absolute;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: drift 10s ease-in-out infinite;
  }
  .particle:nth-child(1) { width: 2px; height: 2px; left: 15%; animation-delay: 0s; }
  .particle:nth-child(2) { width: 1.5px; height: 1.5px; left: 30%; animation-delay: 2s; }
  .particle:nth-child(3) { width: 2px; height: 2px; left: 55%; animation-delay: 1s; }
  .particle:nth-child(4) { width: 1px; height: 1px; left: 70%; animation-delay: 3s; }
  .particle:nth-child(5) { width: 2px; height: 2px; left: 85%; animation-delay: 0.5s; }
  .particle:nth-child(6) { width: 1.5px; height: 1.5px; left: 42%; animation-delay: 4s; }

  @keyframes drift {
    0% { transform: translateY(110vh); opacity: 0; }
    8% { opacity: 0.5; }
    100% { transform: translateY(-10vh); opacity: 0; }
  }

  /* === LAYOUT: TWO-COLUMN === */
  .layout {
    position: absolute;
    inset: 0;
    display: flex;
    z-index: 10;
  }

  /* === LEFT COLUMN: PRODUCT GRID === */
  .left-col {
    flex: 0 0 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(3, min(130px, 10vw));
    grid-template-rows: repeat(3, min(155px, 13vh));
    gap: 14px;
    transform: perspective(1200px) rotateY(6deg) rotateX(2deg);
    transform-style: preserve-3d;
  }

  .product-card {
    background: linear-gradient(135deg, rgba(192,192,192,0.06) 0%, rgba(10,22,40,0.9) 100%);
    border: 1px solid rgba(192,192,192,0.18);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: card-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
  }
  .product-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(192,192,192,0.04) 0%, transparent 40%);
    pointer-events: none;
  }
  .product-card:nth-child(1) { animation-delay: 0.6s; }
  .product-card:nth-child(2) { animation-delay: 0.75s; }
  .product-card:nth-child(3) { animation-delay: 0.9s; }
  .product-card:nth-child(4) { animation-delay: 1.05s; }
  .product-card:nth-child(5) { animation-delay: 1.2s; }
  .product-card:nth-child(6) { animation-delay: 1.35s; }
  .product-card:nth-child(7) { animation-delay: 1.5s; }
  .product-card:nth-child(8) { animation-delay: 1.65s; }

  /* Special glow for center card */
  .product-card:nth-child(5) {
    border-color: rgba(192,192,192,0.35);
    box-shadow: 0 0 30px rgba(192,192,192,0.08), inset 0 0 20px rgba(192,192,192,0.02);
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-icon {
    color: var(--accent);
    opacity: 0.7;
  }
  .card-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(248,250,252,0.5);
    text-align: center;
  }
  .card-color {
    width: 24px;
    height: 3px;
    border-radius: 2px;
    opacity: 0.6;
  }

  /* Different accent colors per card — cool tones */
  .product-card:nth-child(1) .card-color { background: #C0C0C0; }
  .product-card:nth-child(2) .card-color { background: #A5C4D4; }
  .product-card:nth-child(3) .card-color { background: #71717A; }
  .product-card:nth-child(4) .card-color { background: #64748B; }
  .product-card:nth-child(5) .card-color { background: #E2E8F0; }
  .product-card:nth-child(6) .card-color { background: #A78BBA; }
  .product-card:nth-child(7) .card-color { background: #B4C7D9; }
  .product-card:nth-child(8) .card-color { background: #3B6FA0; }

  /* === RIGHT COLUMN: CTA CONTENT === */
  .right-col {
    flex: 0 0 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    position: relative;
  }

  /* Vertical silver line separator */
  .separator-line {
    position: absolute;
    left: 0;
    top: 15%;
    bottom: 15%;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(192,192,192,0.25) 30%, rgba(192,192,192,0.25) 70%, transparent);
    opacity: 0;
    animation: fade-in 2s ease 1s both;
  }

  .cta-cross {
    font-size: 36px;
    color: var(--accent);
    opacity: 0.5;
    text-shadow: 0 0 30px rgba(192,192,192,0.15);
    margin-bottom: 30px;
    opacity: 0;
    animation: reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
  }

  .cta-heading {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(32px, 3.5vw, 52px);
    line-height: 1.15;
    color: var(--cream);
    margin-bottom: 12px;
    opacity: 0;
    animation: reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1s both;
  }
  .cta-heading em {
    font-style: italic;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(192,192,192,0.15);
  }

  .cta-divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 24px 0;
    opacity: 0;
    animation: reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.3s both;
  }
  .cta-divider-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.35;
  }
  .cta-divider-diamond {
    width: 6px;
    height: 6px;
    background: var(--accent);
    transform: rotate(45deg);
    opacity: 0.4;
  }

  .cta-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 300;
    font-style: italic;
    color: rgba(248,250,252,0.5);
    line-height: 1.8;
    max-width: 440px;
    margin-bottom: 40px;
    opacity: 0;
    animation: reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.5s both;
  }

  /* === CTA BUTTON === */
  .cta-button {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 18px 48px;
    border: 1px solid rgba(192,192,192,0.4);
    background: linear-gradient(135deg, rgba(192,192,192,0.08) 0%, rgba(192,192,192,0.02) 100%);
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    animation: reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.8s both;
    transition: all 0.5s ease;
  }
  .cta-button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(192,192,192,0.06), transparent);
    transform: translateX(-100%);
    animation: shimmer 3s ease-in-out 3s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .cta-url {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--cream);
    margin-top: 32px;
    opacity: 0;
    animation: reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 2s both;
  }
  .cta-url span {
    color: var(--accent);
  }

  /* === SOCIAL ROW === */
  .social-row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 28px;
    opacity: 0;
    animation: reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 2.2s both;
  }
  .social-icon {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(192,192,192,0.18);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    opacity: 0.5;
    transition: all 0.4s ease;
  }

  /* === BOTTOM BAR === */
  .bottom-bar {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 36px;
    align-items: center;
    z-index: 10;
    opacity: 0;
    animation: reveal 1.5s ease 2.5s both;
  }
  .bottom-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(192,192,192,0.25);
  }
  .bottom-sep {
    width: 4px;
    height: 4px;
    background: rgba(192,192,192,0.18);
    transform: rotate(45deg);
  }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(20px); filter: blur(3px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  /* === FLOATING GLOW === */
  .glow-orb {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%);
    animation: glow-pulse 6s ease-in-out infinite;
    z-index: 1;
  }
  .glow-orb-1 { top: 20%; right: 15%; animation-delay: 0s; }
  .glow-orb-2 { bottom: 15%; left: 10%; animation-delay: 3s; }

  @keyframes glow-pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.15); }
  }
</style>
</head>
<body>

  <div class="bg"></div>
  <div class="vignette"></div>
  <div class="grain"></div>

  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>

  <div class="frame-outer"></div>
  <div class="frame-inner"></div>

  <!-- Corners -->
  <div class="corner corner-tl">
    <svg viewBox="0 0 80 80" fill="none"><path d="M2 2L2 30Q2 33 5 33L13 33" stroke="#C0C0C0" stroke-width="0.8"/><path d="M2 2L30 2Q33 2 33 5L33 13" stroke="#C0C0C0" stroke-width="0.8"/><circle cx="2" cy="2" r="2" fill="#C0C0C0" opacity="0.5"/></svg>
  </div>
  <div class="corner corner-tr">
    <svg viewBox="0 0 80 80" fill="none"><path d="M2 2L2 30Q2 33 5 33L13 33" stroke="#C0C0C0" stroke-width="0.8"/><path d="M2 2L30 2Q33 2 33 5L33 13" stroke="#C0C0C0" stroke-width="0.8"/><circle cx="2" cy="2" r="2" fill="#C0C0C0" opacity="0.5"/></svg>
  </div>
  <div class="corner corner-bl">
    <svg viewBox="0 0 80 80" fill="none"><path d="M2 2L2 30Q2 33 5 33L13 33" stroke="#C0C0C0" stroke-width="0.8"/><path d="M2 2L30 2Q33 2 33 5L33 13" stroke="#C0C0C0" stroke-width="0.8"/><circle cx="2" cy="2" r="2" fill="#C0C0C0" opacity="0.5"/></svg>
  </div>
  <div class="corner corner-br">
    <svg viewBox="0 0 80 80" fill="none"><path d="M2 2L2 30Q2 33 5 33L13 33" stroke="#C0C0C0" stroke-width="0.8"/><path d="M2 2L30 2Q33 2 33 5L33 13" stroke="#C0C0C0" stroke-width="0.8"/><circle cx="2" cy="2" r="2" fill="#C0C0C0" opacity="0.5"/></svg>
  </div>

  <!-- Two-column layout -->
  <div class="layout">

    <!-- LEFT: Product grid -->
    <div class="left-col">
      <div class="product-grid">

        <div class="product-card">
          <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 19.5v-15A2.5 2.5 0 016.5 2H20v20H6.5a2.5 2.5 0 010-5H20"/></svg></div>
          <div class="card-label">Brochure</div>
          <div class="card-color"></div>
        </div>

        <div class="product-card">
          <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg></div>
          <div class="card-label">Poster</div>
          <div class="card-color"></div>
        </div>

        <div class="product-card">
          <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1" y="6" width="22" height="12" rx="2"/><line x1="1" y1="12" x2="23" y2="12" opacity="0.3"/></svg></div>
          <div class="card-label">Banner</div>
          <div class="card-color"></div>
        </div>

        <div class="product-card">
          <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M22 2L2 8.5l9 3.5L14.5 22z"/></svg></div>
          <div class="card-label">Invitation</div>
          <div class="card-color"></div>
        </div>

        <!-- Center card (highlighted) -->
        <div class="product-card">
          <div class="card-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><line x1="12" y1="2" x2="12" y2="22"/><line x1="5" y1="8" x2="19" y2="8"/></svg></div>
          <div class="card-label" style="color: var(--accent); opacity: 0.8;">Funeral<br>Press</div>
          <div class="card-color" style="background: var(--accent); width: 36px;"></div>
        </div>

        <div class="product-card">
          <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 4v16M17 4v16"/></svg></div>
          <div class="card-label">Booklet</div>
          <div class="card-color"></div>
        </div>

        <div class="product-card">
          <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></div>
          <div class="card-label">Thank You</div>
          <div class="card-color"></div>
        </div>

        <div class="product-card">
          <div class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
          <div class="card-label">Aseda</div>
          <div class="card-color"></div>
        </div>

      </div>
    </div>

    <!-- Vertical separator -->
    <div class="separator-line"></div>

    <!-- RIGHT: CTA content -->
    <div class="right-col">

      <div class="cta-cross">&#10013;</div>

      <div class="cta-heading">
        Start Designing<br><em>Their Tribute</em>
      </div>

      <div class="cta-divider">
        <div class="cta-divider-line"></div>
        <div class="cta-divider-diamond"></div>
        <div class="cta-divider-line"></div>
      </div>

      <div class="cta-subtitle">
        Beautiful funeral stationery designed with<br>
        love, dignity, and cultural pride.<br>
        Ready to print in minutes.
      </div>

      <div class="cta-button">
        <span>Begin Free</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>

      <div class="cta-url">funeral<span>press</span>.org</div>

      <div class="social-row">
        <div class="social-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
