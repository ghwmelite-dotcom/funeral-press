name = "funeralpress-auth-api"
main = "auth-api.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"
GOOGLE_CLIENT_ID = "820118502550-4cju49bcbn2btvr3d31k5cpgdefpv0j1.apps.googleusercontent.com"
CORS_ORIGIN = "https://funeralpress.org"
PAYSTACK_PLAN_MONTHLY = "PLN_e0z9m03nuwd582x"
PAYSTACK_PLAN_ANNUAL = "PLN_2ijmz43rukw84ql"
PAYSTACK_PLAN_MEMORIAL_PREMIUM_ANNUAL = "PLN_cjvqwyiazu993a2"
PAYSTACK_PLAN_MEMORIAL_HERITAGE_ANNUAL = "PLN_359u3n0v2uliz3y"
# USD Paystack plan codes — create in the Paystack dashboard once USD is
# activated for the business, then uncomment (see the 2026-06-12 paystack-usd
# plan's activation checklist). USD subscriptions 503 until these exist.
# PAYSTACK_PLAN_MONTHLY_USD = ""
# PAYSTACK_PLAN_ANNUAL_USD = ""
# PAYSTACK_PLAN_MEMORIAL_PREMIUM_ANNUAL_USD = ""
# PAYSTACK_PLAN_MEMORIAL_HERITAGE_ANNUAL_USD = ""
SHOTSTACK_ENV = "stage"   # 'stage' = free sandbox (watermarked) · 'v1' = production
ADMIN_EMAIL = "ohwpstudios@gmail.com"
# Telegram admin alerts (blog drafts + payments) — bot: @funeralpress_alerts_bot.
# Requires the TELEGRAM_BOT_TOKEN secret; alerts no-op if either is missing.
TELEGRAM_CHAT_ID = "1978649984"

[[d1_databases]]
binding = "DB"
database_name = "funeralpress-db"
database_id = "eab2488e-18cd-4920-adf8-7db724facee5"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "funeralpress-images"

# Workers AI — tribute-video caption generation (@cf/meta/llama-3.1-8b-instruct)
[ai]
binding = "AI"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "3cf6b47818c04ca8828461650478a6c1"

# OTP_KV binding intentionally removed — phone OTPs persist to D1
# `phone_otps`, no code path reads or writes the KV namespace.

# ─── Required secrets (set via `wrangler secret put`) ───
# JWT_SECRET                — shared with donation-api worker; signs/verifies session tokens
# PAYSTACK_SECRET_KEY       — Paystack live secret key (for subscription webhooks)
# RESEND_API_KEY            — for dunning + auth email-verify + PIN-reset emails
# SENTRY_DSN                — Sentry workers DSN (project funeralpress-workers, EU)
# ADMIN_SECRET              — header for legacy admin endpoints (X-Admin-Secret)
# GOOGLE_CLIENT_ID          — set via [vars] above; not a secret
# SHOTSTACK_API_KEY         — Shotstack render API key; use the sandbox key while SHOTSTACK_ENV='stage', the prod key for 'v1'
# STRIPE_SECRET_KEY         — Stripe secret key (sk_live_/sk_test_) for GBP/USD checkout
# STRIPE_WEBHOOK_SECRET     — Stripe webhook signing secret (whsec_) for /stripe/webhook
# TELEGRAM_BOT_TOKEN        — from @BotFather (/newbot); Telegram admin alerts for blog drafts + payments

[[routes]]
pattern = "auth-api.funeralpress.org/*"
zone_name = "funeralpress.org"

[triggers]
# Five crons — dispatch lives in auth-api.js scheduled() by cron string.
#   03:00 UTC daily    D1 cleanup (analytics_events 90d, phone_otps 48h,
#                      processed_webhooks 30d). Runs an hour before donation-api's
#                      04:00 UTC reconciliation to avoid DELETE/SELECT contention.
#   07:00 UTC daily    Anniversary reminder sweep (birthday / death anniversary / holidays).
#                      Africa/Accra is UTC+0 year-round so 07:00 UTC == 07:00 local.
#   08:00 UTC daily    Subscription dunning sweep (Day 1 / Day 3 / Day 7-downgrade).
#   06:00 UTC Wed      AI blog draft generation (§4.6).
#   09:00 UTC Mon      Weekly growth report email (§5.3).
crons = ["0 3 * * *", "0 7 * * *", "0 8 * * *", "0 6 * * 3", "0 9 * * 1"]
