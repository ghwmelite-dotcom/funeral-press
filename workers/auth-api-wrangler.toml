name = "funeralpress-auth-api"
main = "auth-api.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"
GOOGLE_CLIENT_ID = "820118502550-4cju49bcbn2btvr3d31k5cpgdefpv0j1.apps.googleusercontent.com"
CORS_ORIGIN = "https://funeralpress.org"
PAYSTACK_PLAN_MONTHLY = "PLN_e0z9m03nuwd582x"
PAYSTACK_PLAN_ANNUAL = "PLN_2ijmz43rukw84ql"
SHOTSTACK_ENV = "stage"   # 'stage' = free sandbox (watermarked) · 'v1' = production

[[d1_databases]]
binding = "DB"
database_name = "funeralpress-db"
database_id = "eab2488e-18cd-4920-adf8-7db724facee5"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "funeralpress-images"

# Workers AI — tribute-video caption generation (@cf/meta/llama-3.1-8b-instruct)
[ai]
binding = "AI"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "3cf6b47818c04ca8828461650478a6c1"

# OTP_KV binding intentionally removed — phone OTPs persist to D1
# `phone_otps`, no code path reads or writes the KV namespace.

# ─── Required secrets (set via `wrangler secret put`) ───
# JWT_SECRET                — shared with donation-api worker; signs/verifies session tokens
# PAYSTACK_SECRET_KEY       — Paystack live secret key (for subscription webhooks)
# RESEND_API_KEY            — for dunning + auth email-verify + PIN-reset emails
# SENTRY_DSN                — Sentry workers DSN (project funeralpress-workers, EU)
# ADMIN_SECRET              — header for legacy admin endpoints (X-Admin-Secret)
# GOOGLE_CLIENT_ID          — set via [vars] above; not a secret
# SHOTSTACK_API_KEY         — Shotstack render API key; use the sandbox key while SHOTSTACK_ENV='stage', the prod key for 'v1'

[[routes]]
pattern = "auth-api.funeralpress.org/*"
zone_name = "funeralpress.org"

[triggers]
# Two daily crons — dispatch lives in auth-api.js scheduled() by cron string.
#   03:00 UTC  D1 cleanup (analytics_events 90d, phone_otps 48h,
#              processed_webhooks 30d). Runs an hour before donation-api's
#              04:00 UTC reconciliation to avoid DELETE/SELECT contention.
#   08:00 UTC  Subscription dunning sweep (Day 1 / Day 3 / Day 7-downgrade).
crons = ["0 3 * * *", "0 8 * * *"]
