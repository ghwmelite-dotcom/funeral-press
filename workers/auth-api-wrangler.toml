name = "funeralpress-auth-api"
main = "auth-api.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"
GOOGLE_CLIENT_ID = "820118502550-4cju49bcbn2btvr3d31k5cpgdefpv0j1.apps.googleusercontent.com"
CORS_ORIGIN = "https://funeralpress.org"
PAYSTACK_PLAN_MONTHLY = "PLN_e0z9m03nuwd582x"
PAYSTACK_PLAN_ANNUAL = "PLN_2ijmz43rukw84ql"
PHONE_AUTH_ENABLED = "false"

[[d1_databases]]
binding = "DB"
database_name = "funeralpress-db"
database_id = "eab2488e-18cd-4920-adf8-7db724facee5"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "funeralpress-images"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "3cf6b47818c04ca8828461650478a6c1"

[[kv_namespaces]]
binding = "OTP_KV"
id = "a1ac0eaccf854a688954d90859570738"

# ─── Secrets required for phone-auth routes (set via `wrangler secret put`) ───
# HUBTEL_CLIENT_ID          — Hubtel API Client ID (Ghana SMS, +233 routes)
# HUBTEL_CLIENT_SECRET      — Hubtel API Client Secret
# HUBTEL_SENDER_ID          — Approved Hubtel Sender ID (max 11 alphanumeric)
# TWILIO_ACCOUNT_SID        — Twilio Account SID for international SMS (+44, +1, etc.)
# TWILIO_AUTH_TOKEN         — Twilio Auth Token
# TWILIO_FROM_NUMBER        — Twilio phone number (E.164) used as SMS sender
# OTP_PEPPER                — 32-byte random secret; generate with:
#                             node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
# JWT_SECRET                — already set (existing); shared with donation-api worker
# Note: TERMII_API_KEY (Nigerian provider) was the previous Ghana route. Replaced
#       by Hubtel for better delivery + lower cost on +233 numbers. Termii code
#       remains in workers/utils/termii.js for emergency rollback.

[[routes]]
pattern = "auth-api.funeralpress.org/*"
zone_name = "funeralpress.org"
