name = "brochure-live-service-api"
main = "live-service-api.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "LIVE_SERVICE_KV"
id = "cea5d511eba548518c396f5fe05b3701"

[[d1_databases]]
binding = "DB"
database_name = "funeralpress-db"
database_id = "eab2488e-18cd-4920-adf8-7db724facee5"

[[routes]]
pattern = "live-api.funeralpress.org/*"
zone_name = "funeralpress.org"
